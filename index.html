<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gamescope Helper</title>

<style>
:root{
    --bg:#0f1115;
    --card:#171a21;
    --text:#ffffff;
    --text-secondary:#9ca3af;
    --green:#22c55e;
    --green-hover:#16a34a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
}

.logo{
    width:140px;
    height:140px;
    border-radius:32px;
    margin-bottom:24px;
    box-shadow:0 10px 40px rgba(34,197,94,.25);
}

h1{
    font-size:3rem;
    margin-bottom:16px;
    font-weight:700;
}

.description{
    color:var(--text-secondary);
    line-height:1.7;
    margin-bottom:40px;
    font-size:1.1rem;
}

.download-btn{
    display:inline-block;
    text-decoration:none;
    background:var(--green);
    color:white;
    padding:15px 36px;
    border-radius:999px;
    font-weight:600;
    transition:.2s;
}

.download-btn:hover{
    background:var(--green-hover);
    transform:translateY(-2px);
}

.version{
    margin-top:18px;
    color:var(--text-secondary);
    font-size:.9rem;
}

.github{
    margin-top:40px;
}

.github a{
    color:var(--green);
    text-decoration:none;
}

.github a:hover{
    text-decoration:underline;
}

.card{
    background:var(--card);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:48px;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <img src="gamescope helper.png"
             alt="Gamescope Helper"
             class="logo">

        <h1>Gamescope Helper</h1>

        <p class="description">
            Interface gráfica para configurar o Gamescope de forma simples,
            rápida e intuitiva. Sem precisar decorar parâmetros ou editar
            comandos manualmente.
        </p>

        <a class="download-btn"
           href="https://github.com/WillianBr08/Gamescope-Helper/releases/download/0.2.0beta/gamescopehelper.AppImage">
            Download AppImage
        </a>

        <div class="version">
            Version 0.2.0 Beta
        </div>

        <div class="github">
            <a href="https://github.com/WillianBr08/Gamescope-Helper">
                GitHub Repository
            </a>
        </div>

    </div>

</div>

</body>
</html>
